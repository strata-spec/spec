# ---------------------------------------------------------------------------
# DOMAIN
# ---------------------------------------------------------------------------

domain:
  name: "Risk Management Platform"
  description: >
    Internal risk management database for an equities trading division.
    Tracks trader positions, instrument valuations, desk-level exposure
    limits, and daily P&L. Primary consumers are the risk team (daily
    limit monitoring), compliance (breach reporting), and the internal
    analytics platform (exposure dashboards).
  key_concepts:
    - "Position: a trader's current holding in a specific instrument, expressed as net exposure in USD"
    - "Net Exposure: sum of long and short positions after netting within the same instrument on the same desk"
    - "Desk: organisational unit that groups traders and carries collective exposure limits"
    - "Limit: desk-level maximum net exposure for a given effective date"
    - "Breach: condition where a desk's net exposure exceeds its applicable limit"
    - "Business Date: London close date that a position or P&L figure is attributed to"
  temporal_model:
    business_date_column: "business_date"
    timezone: "Europe/London"
    note: >
      All timestamps are stored in UTC. business_date reflects London market
      close and is stored as DATE. Do not confuse created_at (UTC write time)
      with business_date (business attribution date).
  known_gotchas:
    - "instrument_id in positions is an internal surrogate key — not ISIN, Bloomberg ticker, or SEDOL. Join to instruments for external identifiers."
    - "positions.deleted_at IS NULL must always be appended. Deleted positions are soft-deleted, never physically removed."
    - "P&L figures (pnl_usd) are always in USD. Do not apply FX conversion."
    - "desk_limits has one row per desk per effective_date with no valid_to column. Join on both desk_id and effective_date. Missing row means no formal limit recorded for that date."
    - "traders.is_active is real-time. Do not filter on is_active for historical queries."
  provenance:
    source_type: llm_inferred
    source_ref: "xiyan_pass_1"
    confidence: 0.81
    human_reviewed: false

