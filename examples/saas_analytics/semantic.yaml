# ---------------------------------------------------------------------------
# DOMAIN
# ---------------------------------------------------------------------------

domain:
  name: "SaaS Product Analytics"
  description: >
    Product analytics database for a B2B SaaS application. Tracks user
    behaviour, subscription lifecycle, and feature adoption. Primary consumers
    are the growth team (acquisition and activation funnels), finance (MRR and
    churn reporting), and product (feature engagement dashboards).
  key_concepts:
    - "Event: a single user interaction stored in a wide table discriminated by event_type"
    - "Session: a contiguous window of user activity with a 30-minute inactivity timeout"
    - "DAU: count of distinct users with at least one user_active event on a calendar day"
    - "MRR: normalised monthly value of all active subscriptions at a point in time"
    - "Churn: a paid user who cancelled, recorded by churned_at and subscription status"
    - "Plan: a pricing tier governing features and price; users hold one plan at a time"
  temporal_model:
    business_date_column: "occurred_at"
    timezone: "UTC"
    note: >
      All timestamps are TIMESTAMPTZ stored in UTC. Convert to local timezone
      only when displaying to end-users. DAU and WAU calculations must use
      DATE(occurred_at AT TIME ZONE 'UTC') to bucket events into calendar days.
  known_gotchas:
    - "events is a wide table — always filter event_type first. Mixing event types produces semantically incoherent result sets."
    - "DAU must be computed from event_type = 'user_active'. Counting distinct user_id across all event types inflates DAU with system events."
    - "MRR is semi-additive. Filter subscriptions.status = 'active' for current MRR. Summing across cancelled rows gives total contract value, not MRR."
    - "users.plan_id is the current plan only. For plan history, query subscriptions."
    - "sessions.ended_at IS NULL for in-progress sessions. Exclude when computing duration statistics."
    - "subscriptions.ended_at IS NULL for active subscriptions. Filter on status = 'active', not ended_at IS NULL."
  provenance:
    source_type: llm_inferred
    source_ref: "xiyan_pass_1"
    confidence: 0.83
    human_reviewed: false

