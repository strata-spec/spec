models:

  # ---- customers ----------------------------------------------------------

  - model_id: "customers"
    name: "customers"
    label: "Customers"
    description: >
      Registered customer accounts. One row per customer. Guest checkouts are not
      represented here — they appear in orders with a NULL customer_id. GDPR
      right-to-erasure requests are fulfilled by nulling PII columns and setting
      deleted_at; the row is never physically removed.
    physical_source:
      schema: "ecommerce"
      table: "customers"
    primary_key: "customer_id"
    ddl_fingerprint: "sha256:1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2"
    row_count_estimate: 185000
    required_filters:
      - expression: "customers.deleted_at IS NULL"
        reason: >
          customers uses soft-delete semantics for GDPR compliance. Omitting this filter
          includes erased customer records where PII has been nulled, producing misleading
          results and potentially exposing placeholder null values as real data.
    columns:

      - name: "customer_id"
        data_type: "bigint"
        role: identifier
        label: "Customer ID"
        description: >
          Surrogate primary key. Has no business meaning beyond uniquely identifying
          a customer account. Use for joins; do not display or filter on this column directly.
        nullable: false
        cardinality_category: high
        example_values: []
        difficulty: self_evident
        provenance:
          source_type: schema_constraint
          confidence: 1.0
          human_reviewed: false

      - name: "email"
        data_type: "varchar(255)"
        role: identifier
        label: "Email Address"
        description: >
          Customer email address. Unique per account. Contains personal data —
          do not expose in aggregated outputs or log. Nulled for erased customers.
        nullable: true
        cardinality_category: high
        example_values: []
        difficulty: self_evident
