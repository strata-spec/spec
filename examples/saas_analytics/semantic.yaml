# ---------------------------------------------------------------------------
# CONCEPTS  (extended tier)
# ---------------------------------------------------------------------------

concepts:

  - concept_id: "active_user"
    label: "Active User"
    description: >
      A user who generated at least one user_active event in a given time
      window. DAU is the count of distinct active users in a calendar day.
      WAU and MAU extend this to weekly and monthly windows respectively.
      Always filter event_type = 'user_active' — do not count distinct user_id
      across all event types.
    definition_sql: >
      SELECT
        DATE(e.occurred_at AT TIME ZONE 'UTC') AS activity_date,
        COUNT(DISTINCT e.user_id)              AS dau
      FROM saas.events e
      WHERE e.event_type = 'user_active'
        AND e.occurred_at >= :start_date
        AND e.occurred_at <  :end_date
      GROUP BY DATE(e.occurred_at AT TIME ZONE 'UTC')
      ORDER BY activity_date
    broader: null
    maps_to_models:
      - "events"
      - "users"
    maps_to_columns:
      - model: "events"
        column: "user_id"
      - model: "events"
        column: "event_type"
      - model: "events"
        column: "occurred_at"
    provenance:
      source_type: user_defined
      confidence: 1.0
      human_reviewed: true

  - concept_id: "monthly_recurring_revenue"
    label: "Monthly Recurring Revenue (MRR)"
    description: >
      The normalised monthly value of all active subscriptions at a point in
      time. MRR is a stock metric — it represents the current run-rate, not
      a cumulative sum. To compute MRR for a specific month, filter
      subscriptions where started_at <= last day of month AND (ended_at IS NULL
      OR ended_at > last day of month) AND status = 'active'. Do not SUM
      mrr_usd across multiple months without explicit user instruction.
    definition_sql: >
      SELECT
        SUM(s.mrr_usd) AS mrr_usd
      FROM saas.subscriptions s
      WHERE s.status = 'active'
        AND s.started_at <= :as_of_date
        AND (s.ended_at IS NULL OR s.ended_at > :as_of_date)
    broader: null
    maps_to_models:
      - "subscriptions"
      - "plans"
    maps_to_columns:
      - model: "subscriptions"
        column: "mrr_usd"
      - model: "subscriptions"
        column: "status"
      - model: "subscriptions"
        column: "started_at"
      - model: "subscriptions"
        column: "ended_at"
    provenance:
      source_type: user_defined
      confidence: 1.0
      human_reviewed: true

  - concept_id: "churn"
    label: "Churn"
    description: >
      A user churn event occurs when a paying subscriber cancels their
      subscription. Churn is tracked in two places: users.churned_at (the
      timestamp the user churned) and the subscription row transitioning to
      status = 'cancelled'. Churn rate for a cohort = churned users in period
      / active users at start of period. Do not count free-plan cancellations
      as churn — only paid-plan cancellations.
    definition_sql: >
      SELECT
        DATE_TRUNC('month', u.churned_at) AS churn_month,
        COUNT(DISTINCT u.user_id)         AS churned_users
      FROM saas.users u
      JOIN saas.subscriptions s
        ON u.user_id = s.user_id
        AND s.status = 'cancelled'
      JOIN saas.plans pl
        ON s.plan_id = pl.plan_id
        AND pl.tier != 'free'
      WHERE u.churned_at IS NOT NULL
        AND u.churned_at >= :start_date
        AND u.churned_at <  :end_date
      GROUP BY DATE_TRUNC('month', u.churned_at)
      ORDER BY churn_month
    broader: null
    maps_to_models:
      - "users"
      - "subscriptions"
      - "plans"
    maps_to_columns:
      - model: "users"
        column: "churned_at"
      - model: "subscriptions"
        column: "status"
      - model: "plans"
        column: "tier"
    provenance:
      source_type: log_inferred
      source_ref: "queryid:7781293"
      confidence: 0.77
      human_reviewed: false

# ---------------------------------------------------------------------------
# METRICS  (core tier)
# ---------------------------------------------------------------------------

metrics:

  - metric_id: "daily_active_users"
    name: "daily_active_users"
    label: "Daily Active Users (DAU)"
    description: >
      Count of distinct users who generated at least one user_active event on
      a given calendar day. DAU is a semi-additive metric — it can be
      disaggregated by user attributes (country, plan tier) but cannot be
      summed across days (that gives cumulative unique users, not average DAU).
      Always filter event_type = 'user_active'. Time dimension is
      events.occurred_at bucketed to calendar day.
    expression: "COUNT(DISTINCT events.user_id)"
    aggregation: count_distinct
    default_time_dimension:
      model: "events"
      column: "occurred_at"
    valid_dimensions:
      - model: "users"
        column: "country"
      - model: "users"
        column: "plan_id"
      - model: "plans"
        column: "tier"
    invalid_dimensions:
      - model: "events"
        column: "event_id"
        reason: "Surrogate key. Grouping by event_id produces one row per event, not a meaningful DAU aggregate."
      - model: "events"
        column: "session_id"
        reason: "A user may have multiple sessions per day. Grouping by session_id breaks the distinct-user counting semantics of DAU."
    required_filters:
      - expression: "events.event_type = 'user_active'"
        reason: "DAU is defined as users with a user_active event. Omitting this filter counts all event types and inflates DAU with bot traffic and system-generated events."
    additivity: semi_additive
    provenance:
      source_type: log_inferred
      source_ref: "queryid:5512019,queryid:5512044"
      confidence: 0.84
      human_reviewed: false

  - metric_id: "monthly_recurring_revenue"
    name: "monthly_recurring_revenue"
    label: "Monthly Recurring Revenue (MRR)"
    description: >
      Sum of mrr_usd across all active subscriptions as of a point in time.
      MRR is a semi-additive metric — it can be disaggregated by plan tier or
      user country but must not be summed across time periods (summing gives
      cumulative contract value, not MRR). Always filter status = 'active'.
      Default time dimension is subscriptions.started_at for trend reporting;
      for as-of queries use a date filter on started_at and ended_at.
    expression: "SUM(subscriptions.mrr_usd)"
    aggregation: sum
    default_time_dimension:
      model: "subscriptions"
      column: "started_at"
    valid_dimensions:
      - model: "plans"
        column: "tier"
      - model: "plans"
        column: "billing_period"
      - model: "plans"
        column: "plan_name"
      - model: "users"
        column: "country"
    invalid_dimensions:
      - model: "subscriptions"
        column: "subscription_id"
        reason: "Surrogate key. Produces one row per subscription, not a meaningful MRR aggregate."
      - model: "subscriptions"
        column: "ended_at"
        reason: "Grouping by ended_at fragments MRR across cancellation dates rather than measuring the current run-rate."
    required_filters:
      - expression: "subscriptions.status = 'active'"
        reason: "MRR must include only active subscriptions. Including cancelled or paused subscriptions overstates MRR with historical contract value."
    additivity: semi_additive
    provenance:
      source_type: log_inferred
      source_ref: "queryid:6614302,queryid:6614387"
      confidence: 0.81
      human_reviewed: false

  - metric_id: "feature_event_count"
    name: "feature_event_count"
    label: "Feature Usage Event Count"
    description: >
      Count of feature_used events for a specific feature. Use this metric
      to measure feature adoption and engagement. Always supply a feature_name
      filter — the required_filter ensures event_type is always set to
      'feature_used' to prevent mixing with other event types.
    expression: "COUNT(events.event_id)"
    aggregation: count
    default_time_dimension:
      model: "events"
      column: "occurred_at"
    valid_dimensions:
      - model: "events"
        column: "feature_name"
      - model: "users"
        column: "country"
      - model: "plans"
        column: "tier"
    invalid_dimensions:
      - model: "events"
        column: "page_name"
        reason: "page_name is only populated for page_view events. It is always NULL for feature_used events."
    required_filters:
      - expression: "events.event_type = 'feature_used'"
        reason: "feature_event_count must count only feature_used events. Omitting this mixes page views and other event types into the count."
    additivity: fully_additive
    provenance:
      source_type: log_inferred
      source_ref: "queryid:8821044"
      confidence: 0.78
      human_reviewed: false

  - metric_id: "avg_session_duration"
    name: "avg_session_duration"
    label: "Average Session Duration (Seconds)"
    description: >
      Average duration in seconds of completed user sessions. Excludes sessions
      currently in progress (ended_at IS NULL). Non-additive — do not SUM
      this metric. Use for engagement benchmarking and product health tracking.
    expression: "AVG(sessions.duration_seconds)"
    aggregation: avg
    default_time_dimension:
      model: "sessions"
      column: "started_at"
    valid_dimensions:
      - model: "users"
        column: "country"
      - model: "plans"
        column: "tier"
    invalid_dimensions:
      - model: "sessions"
        column: "session_id"
        reason: "Surrogate key. Grouping by session_id produces one row per session with the duration of that session — not a meaningful aggregate."
    required_filters:
      - expression: "sessions.ended_at IS NOT NULL"
        reason: "Sessions with ended_at IS NULL are in progress and have no computed duration_seconds. Including them produces NULL values in the average."
    additivity: non_additive
    provenance:
      source_type: log_inferred
      source_ref: "queryid:9933201"
      confidence: 0.73
      human_reviewed: false

# ---------------------------------------------------------------------------
# QUERY TEMPLATES  (extended tier)
# ---------------------------------------------------------------------------

query_templates:

  - template_id: "dau_trend"
    description: "Daily active users over a date range, optionally broken down by plan tier. Standard engagement trend report."
    sql_template: >
      SELECT
        DATE(e.occurred_at AT TIME ZONE 'UTC') AS activity_date,
        pl.tier,
        COUNT(DISTINCT e.user_id)              AS dau
      FROM saas.events e
      JOIN saas.users u  ON e.user_id  = u.user_id
      JOIN saas.plans pl ON u.plan_id  = pl.plan_id
      WHERE e.event_type  = 'user_active'
        AND e.occurred_at >= :start_date
        AND e.occurred_at <  :end_date
      GROUP BY DATE(e.occurred_at AT TIME ZONE 'UTC'), pl.tier
      ORDER BY activity_date, pl.tier
    parameters:
      - name: start_date
        data_type: timestamptz
        description: "Start of the reporting window (inclusive). Format: ISO 8601 (e.g. '2026-01-01T00:00:00Z')."
      - name: end_date
        data_type: timestamptz
        description: "End of the reporting window (exclusive). Format: ISO 8601."
    provenance:
      source_type: log_inferred
      source_ref: "queryid:5512019"
      confidence: 0.87
      human_reviewed: false

  - template_id: "mrr_by_plan_tier"
    description: "Current MRR broken down by plan tier. Shows revenue concentration across plan tiers at a given point in time."
    sql_template: >
      SELECT
        pl.tier,
        pl.billing_period,
        COUNT(s.subscription_id) AS subscriber_count,
        SUM(s.mrr_usd)           AS mrr_usd
      FROM saas.subscriptions s
      JOIN saas.plans pl ON s.plan_id = pl.plan_id
      WHERE s.status    = 'active'
        AND s.started_at <= :as_of_date
        AND (s.ended_at IS NULL OR s.ended_at > :as_of_date)
      GROUP BY pl.tier, pl.billing_period
      ORDER BY mrr_usd DESC
    parameters:
      - name: as_of_date
        data_type: timestamptz
        description: "The point-in-time date for the MRR snapshot. Use NOW() for current MRR. Format: ISO 8601."
    provenance:
      source_type: log_inferred
      source_ref: "queryid:6614302"
      confidence: 0.89
      human_reviewed: false

  - template_id: "feature_adoption_by_plan"
    description: "Feature usage event counts per feature, broken down by plan tier. Identifies which features drive engagement on which plans."
    sql_template: >
      SELECT
        e.feature_name,
        pl.tier,
        COUNT(e.event_id)              AS event_count,
        COUNT(DISTINCT e.user_id)      AS unique_users
      FROM saas.events e
      JOIN saas.users u  ON e.user_id  = u.user_id
      JOIN saas.plans pl ON u.plan_id  = pl.plan_id
      WHERE e.event_type   = 'feature_used'
        AND e.occurred_at >= :start_date
        AND e.occurred_at <  :end_date
      GROUP BY e.feature_name, pl.tier
      ORDER BY event_count DESC
    parameters:
      - name: start_date
        data_type: timestamptz
        description: "Start of the reporting window (inclusive). Format: ISO 8601."
      - name: end_date
        data_type: timestamptz
        description: "End of the reporting window (exclusive). Format: ISO 8601."
    provenance:
      source_type: log_inferred
      source_ref: "queryid:8821044"
      confidence: 0.82
      human_reviewed: false
