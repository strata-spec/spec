# ---------------------------------------------------------------------------
# DOMAIN
# ---------------------------------------------------------------------------

domain:
  name: "E-commerce Platform"
  description: >
    Transactional e-commerce database for a direct-to-consumer retail operation.
    Tracks customer accounts, product catalogue, inventory levels, orders, and
    fulfilment events. Primary consumers are the analytics team (revenue dashboards,
    cohort analysis), operations (fulfilment monitoring), and the customer support
    team (order lookup). This database is the system of record for all
    post-checkout activity.
  key_concepts:
    - "Order: a single checkout event; lifecycle is pending → confirmed → shipped → delivered (or cancelled/refunded)"
    - "Order Item: a single SKU line within an order with quantity and the unit price captured at purchase time"
    - "Customer: a registered account holder; guest checkouts have NULL customer_id on orders"
    - "Product: a sellable catalogue item; discontinued items have status = 'discontinued', not deleted"
    - "Revenue: sum of order_items.unit_price * order_items.quantity for non-cancelled, non-refunded orders"
    - "Gross Margin: Revenue minus COGS (order_items.unit_cost); COGS may be NULL for unmatched supplier invoices"
  temporal_model:
    business_date_column: "created_at"
    timezone: "UTC"
    note: >
      All timestamps are stored in UTC. Use orders.created_at as the primary time
      dimension for revenue trending. Do not use orders.updated_at for trend analysis —
      it reflects the most recent status change, not the purchase date.
  known_gotchas:
    - "orders.total_amount is a denormalised convenience field. Always aggregate from order_items.unit_price * order_items.quantity for accurate revenue."
    - "products.price is the current catalogue price. The actual sale price is in order_items.unit_price, captured at order creation."
    - "customers.deleted_at IS NULL must always be appended for GDPR compliance. Deleted customer PII is nulled."
    - "order_items.unit_cost is NULL for ~4% of items. Exclude NULL costs from margin calculations and document the exclusion."
    - "orders.status uses lowercase string literals. All filter values must be lowercase."
    - "inventory.quantity_on_hand can be legitimately negative (backorders). Do not treat negative values as data errors."
    - "orders.customer_id is NULL for guest checkouts (~22% of orders). Do not exclude NULL customer_id from revenue queries unless asked."
  provenance:
    source_type: llm_inferred
    source_ref: "strata_init_pass_1"
    confidence: 0.83
    human_reviewed: false

