# ---------------------------------------------------------------------------
# CONCEPTS  (extended tier)
# ---------------------------------------------------------------------------

concepts:

  - concept_id: "net_exposure"
    label: "Net Exposure"
    description: >
      The aggregate value of a trader's or desk's open positions after netting
      long and short positions in the same instrument. Positive values indicate
      net long; negative values indicate net short. Always expressed in USD.
      Use SUM(net_exposure_usd) grouped by the relevant dimension. Always filter
      deleted_at IS NULL and specify a business_date.
    definition_sql: >
      SELECT
        p.desk_id,
        d.desk_name,
        p.instrument_id,
        i.instrument_name,
        i.asset_class,
        p.business_date,
        SUM(p.net_exposure_usd) AS net_exposure_usd
      FROM risk.positions p
      JOIN risk.instruments i ON p.instrument_id = i.instrument_id
      JOIN risk.desks d ON p.desk_id = d.desk_id
      WHERE p.deleted_at IS NULL
        AND i.deleted_at IS NULL
        AND p.business_date = :business_date
      GROUP BY p.desk_id, d.desk_name, p.instrument_id, i.instrument_name,
               i.asset_class, p.business_date
    broader: null
    maps_to_models:
      - "positions"
      - "instruments"
      - "desks"
    maps_to_columns:
      - model: "positions"
        column: "net_exposure_usd"
      - model: "positions"
        column: "business_date"
      - model: "positions"
        column: "deleted_at"
    provenance:
      source_type: llm_inferred
      source_ref: "xiyan_pass_1"
      confidence: 0.71
      human_reviewed: false

  - concept_id: "breach"
    label: "Limit Breach"
    description: >
      A condition where a desk's net exposure in an instrument exceeds the
      approved limit for that desk on that business date. A breach exists when
      SUM(net_exposure_usd) > desk_limits.limit_usd for the matching desk_id
      and effective_date. The breach amount is the difference between net
      exposure and the limit. Note: limit_type must be checked — 'gross' limits
      compare against ABS(SUM(net_exposure_usd)), 'net' limits compare against
      the signed sum.
    definition_sql: >
      SELECT
        p.desk_id,
        d.desk_name,
        p.instrument_id,
        i.instrument_name,
        p.business_date,
        SUM(p.net_exposure_usd)     AS net_exposure_usd,
        dl.limit_usd,
        dl.limit_type,
        SUM(p.net_exposure_usd) - dl.limit_usd AS breach_amount
      FROM risk.positions p
      JOIN risk.instruments i
        ON p.instrument_id = i.instrument_id
        AND i.deleted_at IS NULL
      JOIN risk.desks d
        ON p.desk_id = d.desk_id
      JOIN risk.desk_limits dl
        ON p.desk_id = dl.desk_id
        AND p.business_date = dl.effective_date
        AND dl.deleted_at IS NULL
      WHERE p.deleted_at IS NULL
        AND p.business_date = :business_date
        AND dl.limit_type = 'net'
      GROUP BY p.desk_id, d.desk_name, p.instrument_id, i.instrument_name,
               p.business_date, dl.limit_usd, dl.limit_type
      HAVING SUM(p.net_exposure_usd) > dl.limit_usd
    broader: null
    maps_to_models:
      - "positions"
      - "desk_limits"
      - "instruments"
      - "desks"
    maps_to_columns:
      - model: "positions"
        column: "net_exposure_usd"
      - model: "desk_limits"
        column: "limit_usd"
      - model: "desk_limits"
        column: "limit_type"
    provenance:
      source_type: user_defined
      confidence: 1.0
      human_reviewed: true

# ---------------------------------------------------------------------------
# METRICS  (core tier)
# ---------------------------------------------------------------------------

metrics:

  - metric_id: "total_net_exposure"
    name: "total_net_exposure"
    label: "Total Net Exposure"
    description: >
      Total net exposure in USD across all positions for a given business date.
      Sums net_exposure_usd across all non-deleted positions. Always filter by
      business_date — this is a point-in-time metric, not a cumulative one.
      Do not sum across multiple business_date values without explicit user
      instruction.
    expression: "SUM(positions.net_exposure_usd)"
    aggregation: sum
    default_time_dimension:
      model: "positions"
      column: "business_date"
    valid_dimensions:
      - model: "positions"
        column: "desk_id"
      - model: "positions"
        column: "instrument_id"
      - model: "desks"
        column: "desk_name"
      - model: "desks"
        column: "region"
      - model: "instruments"
        column: "asset_class"
      - model: "instruments"
        column: "sector"
    invalid_dimensions:
      - model: "positions"
        column: "position_id"
        reason: "Surrogate key. Grouping by this produces one row per position — not a meaningful aggregate."
      - model: "positions"
        column: "trader_id"
        reason: "Trader-level breakdown reveals individual P&L to other desks. Only permitted when trader_id filter is explicitly scoped to the requesting user's own desk."
    required_filters:
      - "positions.deleted_at IS NULL"
    additivity: fully_additive
    provenance:
      source_type: log_inferred
      source_ref: "queryid:1029384,queryid:1029392"
      confidence: 0.79
      human_reviewed: false

  - metric_id: "total_pnl"
    name: "total_pnl"
    label: "Total P&L"
    description: >
      Total profit and loss in USD for a given period. Sum of pnl_usd across
      non-deleted positions. This is a daily figure per position — summing across
      multiple business_date values gives cumulative P&L for the period.
      Always in USD, no FX conversion required.
    expression: "SUM(positions.pnl_usd)"
    aggregation: sum
    default_time_dimension:
      model: "positions"
      column: "business_date"
    valid_dimensions:
      - model: "positions"
        column: "desk_id"
      - model: "positions"
        column: "instrument_id"
      - model: "positions"
        column: "business_date"
      - model: "desks"
        column: "desk_name"
      - model: "desks"
        column: "region"
      - model: "instruments"
        column: "asset_class"
    invalid_dimensions:
      - model: "positions"
        column: "position_id"
        reason: "Surrogate key. Produces one row per position, not a meaningful aggregate."
    required_filters:
      - "positions.deleted_at IS NULL"
    additivity: fully_additive
    provenance:
      source_type: log_inferred
      source_ref: "queryid:2847112,queryid:2847198"
      confidence: 0.81
      human_reviewed: false

  - metric_id: "limit_utilisation"
    name: "limit_utilisation"
    label: "Limit Utilisation"
    description: >
      Ratio of a desk's net exposure to its approved limit, expressed as a
      decimal (1.0 = 100% utilisation). Values above 1.0 indicate a breach.
      Requires a specific business_date. Only meaningful at desk level —
      do not aggregate across desks. Non-additive: do not SUM this metric.
    expression: "SUM(positions.net_exposure_usd) / NULLIF(MAX(desk_limits.limit_usd), 0)"
    aggregation: ratio
    default_time_dimension:
      model: "positions"
      column: "business_date"
    valid_dimensions:
      - model: "positions"
        column: "desk_id"
      - model: "desks"
        column: "desk_name"
    invalid_dimensions:
      - model: "positions"
        column: "instrument_id"
        reason: "Limit utilisation is a desk-level concept. Instrument-level breakdown produces ratios that do not correspond to the desk's limit."
      - model: "instruments"
        column: "asset_class"
        reason: "Asset class grouping would produce partial-desk ratios that cannot be compared against desk-level limits."
    required_filters:
      - "positions.deleted_at IS NULL"
      - "desk_limits.deleted_at IS NULL"
    additivity: non_additive
    provenance:
      source_type: log_inferred
      source_ref: "queryid:4019283"
      confidence: 0.66
      human_reviewed: false

# ---------------------------------------------------------------------------
# QUERY TEMPLATES  (extended tier)
# ---------------------------------------------------------------------------

query_templates:

  - template_id: "desk_exposure_by_date"
    description: "Net exposure per desk for a given business date, ordered by absolute exposure descending. Standard daily exposure report."
    sql_template: >
      SELECT
        p.desk_id,
        d.desk_name,
        d.region,
        SUM(p.net_exposure_usd) AS net_exposure_usd
      FROM risk.positions p
      JOIN risk.desks d ON p.desk_id = d.desk_id
      WHERE p.business_date = :business_date
        AND p.deleted_at IS NULL
      GROUP BY p.desk_id, d.desk_name, d.region
      ORDER BY ABS(SUM(p.net_exposure_usd)) DESC
    parameters:
      - name: business_date
        data_type: date
        description: "The business date to report on. Format: YYYY-MM-DD. Use the most recent business_date in positions for today's report."
    provenance:
      source_type: log_inferred
      source_ref: "queryid:9920011"
      confidence: 0.88
      human_reviewed: false

  - template_id: "breach_report_by_date"
    description: "All desks with net exposure exceeding their approved net limit on a given business date. Returns desk, exposure, limit, and breach amount."
    sql_template: >
      SELECT
        p.desk_id,
        d.desk_name,
        p.business_date,
        SUM(p.net_exposure_usd)                       AS net_exposure_usd,
        dl.limit_usd,
        SUM(p.net_exposure_usd) - dl.limit_usd        AS breach_amount,
        ROUND(
          SUM(p.net_exposure_usd) / NULLIF(dl.limit_usd, 0) * 100, 2
        )                                             AS utilisation_pct
      FROM risk.positions p
      JOIN risk.desks d
        ON p.desk_id = d.desk_id
      JOIN risk.desk_limits dl
        ON p.desk_id = dl.desk_id
        AND p.business_date = dl.effective_date
        AND dl.deleted_at IS NULL
        AND dl.limit_type = 'net'
      WHERE p.deleted_at IS NULL
        AND p.business_date = :business_date
      GROUP BY p.desk_id, d.desk_name, p.business_date, dl.limit_usd
      HAVING SUM(p.net_exposure_usd) > dl.limit_usd
      ORDER BY breach_amount DESC
    parameters:
      - name: business_date
        data_type: date
        description: "The business date to check for breaches. Format: YYYY-MM-DD."
    provenance:
      source_type: log_inferred
      source_ref: "queryid:9920144,queryid:9920201"
      confidence: 0.84
      human_reviewed: false

  - template_id: "exposure_by_asset_class"
    description: "Net exposure broken down by asset class for a given desk and business date."
    sql_template: >
      SELECT
        i.asset_class,
        SUM(p.net_exposure_usd)  AS net_exposure_usd,
        COUNT(DISTINCT p.instrument_id) AS instrument_count
      FROM risk.positions p
      JOIN risk.instruments i
        ON p.instrument_id = i.instrument_id
        AND i.deleted_at IS NULL
      WHERE p.desk_id = :desk_id
        AND p.business_date = :business_date
        AND p.deleted_at IS NULL
      GROUP BY i.asset_class
      ORDER BY ABS(SUM(p.net_exposure_usd)) DESC
    parameters:
      - name: desk_id
        data_type: integer
        description: "The internal desk_id to report on. Join to desks to look up desk_id by desk_name."
      - name: business_date
        data_type: date
        description: "The business date to report on. Format: YYYY-MM-DD."
    provenance:
      source_type: log_inferred
      source_ref: "queryid:9921003"
      confidence: 0.81
      human_reviewed: false
