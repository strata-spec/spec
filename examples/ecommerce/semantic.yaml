# ---------------------------------------------------------------------------
# METRICS
# ---------------------------------------------------------------------------

metrics:

  - metric_id: "revenue"
    name: "revenue"
    label: "Revenue (USD)"
    description: >
      Total revenue in USD. Defined as the sum of unit_price × quantity across all
      order_items belonging to orders with a non-cancelled, non-refunded status.
      Always use this metric definition — do not sum orders.total_amount, which is
      a denormalised field that disagrees with line-level data when promotions apply.
    expression: "SUM(order_items.unit_price * order_items.quantity)"
    aggregation: sum
    default_time_dimension:
      model: "orders"
      column: "created_at"
    valid_dimensions:
      - model: "products"
        column: "category"
      - model: "orders"
        column: "status"
      - model: "orders"
        column: "shipping_country_code"
      - model: "customers"
        column: "tier"
      - model: "customers"
        column: "country_code"
    invalid_dimensions:
      - model: "customers"
        column: "email"
        reason: "PII — must not appear in group-by outputs."
      - model: "customers"
        column: "name"
        reason: "PII — must not appear in group-by outputs."
    required_filters:
      - expression: "orders.status NOT IN ('cancelled', 'refunded')"
        reason: >
          Revenue must exclude cancelled and refunded orders. Omitting this filter
          inflates revenue figures and is the most common agent mistake on this database.
    additivity: fully_additive
    provenance:
      source_type: user_defined
      confidence: 1.0
      human_reviewed: true

  - metric_id: "order_count"
    name: "order_count"
    label: "Order Count"
    description: >
      Number of distinct orders placed. Counts all orders including guest checkouts.
      Apply status filters explicitly when you want only completed or confirmed orders.
    expression: "orders.order_id"
    aggregation: count_distinct
    default_time_dimension:
      model: "orders"
      column: "created_at"
    valid_dimensions:
      - model: "orders"
        column: "status"
      - model: "orders"
        column: "shipping_country_code"
      - model: "customers"
        column: "tier"
    required_filters:
      - expression: "orders.status NOT IN ('cancelled', 'refunded')"
        reason: >
          Default order count excludes cancelled and refunded orders to align with
          business definition of a 'completed' order. Override this filter explicitly
          if all lifecycle stages are needed.
    additivity: fully_additive
    provenance:
      source_type: log_inferred
      source_ref: "query_log_2026_q1.jsonl"
      confidence: 0.88
      human_reviewed: false

  - metric_id: "gross_margin"
    name: "gross_margin"
    label: "Gross Margin (USD)"
    description: >
      Gross margin in USD. Defined as revenue minus cost of goods sold:
      SUM((unit_price - unit_cost) * quantity). Rows where unit_cost IS NULL are
      excluded from this calculation. The margin figure will therefore undercount
      total margin when cost data is missing — document this in any report output.
    expression: "SUM((order_items.unit_price - order_items.unit_cost) * order_items.quantity)"
    aggregation: sum
    default_time_dimension:
      model: "orders"
      column: "created_at"
    valid_dimensions:
      - model: "products"
        column: "category"
      - model: "orders"
        column: "shipping_country_code"
    required_filters:
      - expression: "orders.status NOT IN ('cancelled', 'refunded')"
        reason: "Exclude cancelled and refunded orders from margin calculations."
      - expression: "order_items.unit_cost IS NOT NULL"
        reason: >
          Rows with NULL unit_cost cannot contribute to margin calculations.
          Excluding them ensures the result is not silently incorrect due to
          NULL arithmetic. Always note the exclusion in query output.
    additivity: fully_additive
    provenance:
      source_type: llm_inferred
      agent: "strata-annotator-v1"
      confidence: 0.71
      human_reviewed: true

  - metric_id: "active_customer_count"
    name: "active_customer_count"
    label: "Active Customer Count"
    description: >
      Number of distinct registered customers who have placed at least one
      non-cancelled, non-refunded order in the period. Excludes guest checkouts
      (NULL customer_id) and soft-deleted customer accounts.
    expression: "orders.customer_id"
    aggregation: count_distinct
    default_time_dimension:
      model: "orders"
      column: "created_at"
    valid_dimensions:
      - model: "customers"
        column: "tier"
      - model: "customers"
        column: "country_code"
      - model: "orders"
        column: "shipping_country_code"
    required_filters:
      - expression: "orders.customer_id IS NOT NULL"
        reason: "Excludes guest checkouts, which have no customer account to count."
      - expression: "orders.status NOT IN ('cancelled', 'refunded')"
        reason: "Only count customers who completed at least one order."
      - expression: "customers.deleted_at IS NULL"
        reason: "Exclude soft-deleted customer records."
    additivity: semi_additive
    provenance:
      source_type: user_defined
      confidence: 1.0
      human_reviewed: true

# ---------------------------------------------------------------------------
# CONCEPTS
# ---------------------------------------------------------------------------

concepts:

  - concept_id: "revenue_concept"
    label: "Revenue"
    description: >
      Total receipts from product sales, net of cancellations and refunds.
      Computed from order line items, not from the denormalised order total field.
    definition_sql: >
      SELECT SUM(oi.unit_price * oi.quantity)
      FROM ecommerce.order_items oi
      JOIN ecommerce.orders o ON oi.order_id = o.order_id
      WHERE o.status NOT IN ('cancelled', 'refunded')
    broader: null
    maps_to_models:
      - "orders"
      - "order_items"
    maps_to_columns:
      - model: "order_items"
        column: "unit_price"
      - model: "order_items"
        column: "quantity"
    provenance:
      source_type: user_defined
      confidence: 1.0
      human_reviewed: true

  - concept_id: "gross_margin_concept"
    label: "Gross Margin"
    description: >
      Revenue minus cost of goods sold. Rows where unit_cost is NULL are excluded.
      Gross margin percentage = gross_margin / revenue × 100.
    broader: "revenue_concept"
    maps_to_models:
      - "order_items"
    maps_to_columns:
      - model: "order_items"
        column: "unit_price"
      - model: "order_items"
        column: "unit_cost"
      - model: "order_items"
        column: "quantity"
    provenance:
      source_type: user_defined
      confidence: 1.0
      human_reviewed: true
