# ---------------------------------------------------------------------------
# RELATIONSHIPS
# ---------------------------------------------------------------------------

relationships:

  - relationship_id: "orders_to_customers"
    from_model: "orders"
    from_column: "customer_id"
    to_model: "customers"
    to_column: "customer_id"
    relationship_type: many_to_one
    join_condition: "orders.customer_id = customers.customer_id AND customers.deleted_at IS NULL"
    semantic_role: >
      Links an order to the registered customer who placed it. NULL customer_id on orders
      indicates a guest checkout — this join will exclude guest orders. Include the
      deleted_at IS NULL guard to avoid joining to erased customer records.
    always_valid: false
    preferred: true
    provenance:
      source_type: schema_constraint
      confidence: 1.0
      human_reviewed: true

  - relationship_id: "order_items_to_orders"
    from_model: "order_items"
    from_column: "order_id"
    to_model: "orders"
    to_column: "order_id"
    relationship_type: many_to_one
    join_condition: "order_items.order_id = orders.order_id"
    semantic_role: "Links each line item to its parent order header."
    always_valid: true
    preferred: true
    provenance:
      source_type: schema_constraint
